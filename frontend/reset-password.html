<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | ShieldIQ</title>
  
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/global.css">
  
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    
    /* Background Glows */
    .hero-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--teal-glow) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
    }
    
    .reset-card {
      background: var(--card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 440px;
      position: relative;
      box-shadow: var(--shadow-lg);
      animation: modal-in 0.4s var(--ease-out) both;
    }
    
    .modal-logo {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 22px;
      color: var(--white);
      margin-bottom: 4px;
      text-align: center;
    }
    
    .modal-logo .accent {
      color: var(--teal);
    }
    
    .modal-sub-brand {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
      text-align: center;
    }
    
    .modal-h {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }
    
    .modal-p {
      color: var(--warm);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
      text-align: center;
    }
    
    .reset-btn {
      width: 100%;
      padding: 14px;
      background: var(--gradient-primary);
      color: var(--black);
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
      font-family: var(--font-heading);
      box-shadow: 0 4px 20px rgba(0, 212, 160, 0.25);
    }
    
    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 212, 160, 0.4);
    }
    
    .success-panel {
      display: none;
      text-align: center;
      padding: 10px 0;
    }
    
    .success-icon {
      font-size: 48px;
      color: var(--teal);
      margin-bottom: 16px;
      animation: float 2s infinite ease-in-out;
    }
    
    .success-h {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="hero-glow"></div>

  <div class="reset-card">
    <!-- Form State -->
    <div id="formState">
      <div class="modal-logo">SHIELD <span class="accent">IQ</span></div>
      <div class="modal-sub-brand">AI Fraud Detection</div>
      
      <div class="modal-h">Reset Password</div>
      <p class="modal-p">Enter a new secure password for your account.</p>
      
      <label class="field-label">New Password</label>
      <div style="position:relative; margin-bottom:16px;">
        <input class="field" id="resetPass" type="password" placeholder="At least 8 characters" onkeyup="checkStrength()" onkeydown="if(event.key === 'Enter') handleReset()" style="margin-bottom:0; padding-right:42px;">
        <button type="button" onclick="togglePasswordVisibility('resetPass', this)" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; padding:4px; font-size:16px; display:flex; align-items:center; justify-content:center; outline:none; user-select:none;">👁️</button>
      </div>
      
      <div id="pwdStrength" style="font-family:var(--font-mono); font-size:10px; color:var(--muted); margin-top:-10px; margin-bottom:24px;">
        Strength: <span id="pwdLabel">None</span>
      </div>
      
      <button class="reset-btn" onclick="handleReset()">Reset Password</button>
    </div>
    
    <!-- Success State -->
    <div id="successState" class="success-panel">
      <div class="success-icon">✓</div>
      <div class="success-h">Password Reset Successful</div>
      <p class="modal-p">Your password has been updated. You will be redirected to the scanner page in <span id="countdown">3</span> seconds...</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Extract token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Show toast
    function showToast(msg, dur = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), dur);
    }

    // Toggle visibility
    function togglePasswordVisibility(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    // Password Strength Checker
    function checkStrength() {
      const pwd = document.getElementById('resetPass').value;
      const label = document.getElementById('pwdLabel');
      let s = 0;
      if (pwd.length >= 8) s++;
      if (pwd.match(/[A-Z]/)) s++;
      if (pwd.match(/[0-9]/)) s++;
      if (pwd.match(/[^a-zA-Z0-9]/)) s++;

      if (pwd.length === 0) { label.textContent = 'None'; label.style.color = 'var(--muted)'; }
      else if (s <= 1) { label.textContent = 'Weak - Add numbers & symbols'; label.style.color = 'var(--red)'; }
      else if (s === 2) { label.textContent = 'Fair - Add uppercase or symbols'; label.style.color = 'var(--orange)'; }
      else if (s === 3) { label.textContent = 'Good'; label.style.color = 'var(--teal)'; }
      else { label.textContent = 'Strong'; label.style.color = 'var(--teal)'; }
    }

    // Handle Password Reset Request
    async function handleReset() {
      const pass = document.getElementById('resetPass').value;
      if (!pass) {
        showToast('Please enter a password');
        return;
      }
      if (pass.length < 8) {
        showToast('Password must be at least 8 characters long');
        return;
      }
      if (!token) {
        showToast('Invalid or missing reset token');
        return;
      }

      showToast('Updating password...');

      try {
        const r = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: pass })
        });
        const d = await r.json();
        
        if (!r.ok) {
          throw new Error(d.detail || 'Could not reset password');
        }

        // Show Success UI
        document.getElementById('formState').style.display = 'none';
        document.getElementById('successState').style.display = 'block';

        // Redirect timer
        let count = 3;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
          count--;
          countdownEl.textContent = count;
          if (count <= 0) {
            clearInterval(timer);
            window.location.href = '/scan';
          }
        }, 1000);

      } catch (e) {
        showToast(e.message);
      }
    }

    // Check if token exists on load
    window.addEventListener('DOMContentLoaded', () => {
      if (!token) {
        showToast('Error: Password reset token is missing from the link.', 5000);
        document.querySelector('.reset-btn').disabled = true;
        document.querySelector('.reset-btn').style.opacity = '0.5';
        document.querySelector('.reset-btn').style.cursor = 'not-allowed';
      }
    });
  </script>
</body>
</html>
